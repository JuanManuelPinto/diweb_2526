<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La 10 Store</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        .video-section {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .video-responsive {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .video-responsive iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <header class="main-header">
        <div class="logo-container">
            <a href="index.html">
                <img src="img/Logo.png" alt="Logo" class="logo-img">
            </a>
            <h1>La 10 Store</h1>
        </div>
    </header>

    <nav class="main-nav">
        <ul>
            <li><a href="index.html" style="color: inherit; text-decoration: none;">Catalogo</a></li>
            <li><a href="Carrito.html" style="color: inherit; text-decoration: none;">Cesta Compra</a></li>
            <li>Destacados</li>
            <li><a href="paginaUsuario.html" style="color: inherit; text-decoration: none;">Mi Perfil</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero-grid">
            <article class="hero-item"><img src="img/ChrisRamosRojo.png" alt="Camiseta roja"></article>
            <article class="hero-item"><img src="img/Imagencentral.png" alt="Jugador Cádiz"></article>
            <article class="hero-item"><img src="img/JoseMariCadiz.png" alt="Pareja equipación verde"></article>
        </section>

        <div class="section-title">
            <h2>Sección Destacada</h2>
        </div>

        <section class="featured-image">
            <img src="img/ImagenBetis.png" alt="Jugadores Betis">
        </section>

        <div class="section-title">
            <h2>Vídeo Destacado</h2>
        </div>

        <section class="video-section">
            <div class="video-responsive">
                <iframe src="https://www.youtube.com/embed/vK7465WIr3s?si=7HWtNNGaSsYvmft-" title="YouTube video player"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen></iframe>
            </div>
        </section>
    </main>
