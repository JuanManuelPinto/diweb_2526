<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reproductor de Vídeo Optimizado</title>
    <style>
      /* Contenedor con marco negro de 2px y dimensiones SD */
      .video-wrapper {
        width: 640px;
        height: 480px;
        border: 2px solid #000;
        background-color: #000;
        position: relative;
        margin: 20px auto;
        overflow: hidden;
        font-family: sans-serif;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* Controles personalizados */
      .custom-controls {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        padding: 10px 0;
        gap: 15px;
      }

      .custom-controls button {
        background: #fff;
        border: none;
        padding: 5px 15px;
        cursor: pointer;
        font-weight: bold;
        border-radius: 4px;
      }

      .custom-controls button:hover {
        background: #ddd;
      }

      /* Enlaces de descarga y nueva pestaña */
      .video-links {
        text-align: center;
        margin-top: 10px;
      }

      .video-links a {
        margin: 0 10px;
        text-decoration: none;
        color: #0066cc;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="video-wrapper">
      <video
        id="myVideo"
        poster="img/caratula.jpg"
        preload="metadata"
        aria-label="Vídeo generado por IA"
      >
        <source src="video/video.webm" type="video/webm" />
        <source src="video/video.mp4" type="video/mp4" />
        <source src="video/video.ogv" type="video/ogg" />

        <p>
          Tu navegador no admite la etiqueta de vídeo. Por favor, descarga el
          archivo para verlo.
        </p>
      </video>

      <div
        class="custom-controls"
        role="group"
        aria-label="Controles de reproducción"
      >
        <button id="playBtn" aria-label="Reproducir">Play</button>
        <button id="pauseBtn" aria-label="Pausar">Pause</button>
        <button id="muteBtn" aria-label="Silenciar">Mute</button>
      </div>
    </div>

    <div class="video-links">
      <a
        href="video/video.mp4"
        download
        aria-label="Descargar vídeo en formato MP4"
        >Descargar Vídeo</a
      >
      <a
        href="video/video.mp4"
        target="_blank"
        aria-label="Abrir vídeo en una nueva pestaña"
        >Ver en pantalla completa</a
      >
    </div>

    <script>
      const video = document.getElementById("myVideo");
      const playBtn = document.getElementById("playBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const muteBtn = document.getElementById("muteBtn");

      playBtn.addEventListener("click", () => video.play());
      pauseBtn.addEventListener("click", () => video.pause());

      muteBtn.addEventListener("click", () => {
        video.muted = !video.muted;
        muteBtn.textContent = video.muted ? "Unmute" : "Mute";
      });
    </script>
  </body>
</html>
